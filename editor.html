<html>
<style>
body {
  font-family: 'Courier New', monospace;
}
mark {
  background-color: white;
}
.header {
  white-space: nowrap;
  overflow: hidden;
  border-bottom: 5px solid rgb(0, 0, 0);
  animation: animate 2s linear forwards;
}
h1.header {
  color: rgb(0, 0, 0);
}
@keyframes animate {
  0% { 
    width: 0px;
  }
  100% {
    width: 100%;
  }
}
.button {
    font-family: 'Courier New', monospace;
  padding: 15px 25px;
  font-size: 24px;
  text-align: center;
  cursor: pointer;
  outline: none;
  color: #ffffff;
  background-color: rgb(0, 0, 0);
  border: none;
  border-radius: 15px;
  box-shadow: 0 9px #000000;
}

.button:hover {background-color: #000000}

.button:active {
  background-color: #000000;
  box-shadow: 0 5px #666;
  transform: translateY(4px);
}
body{
  height:100vh;
  margin: 0;
  --x: calc(var(--posX, 0) * 1px);
  --y: calc(var(--posY, 0) * 1px);
  background-image: 
    linear-gradient(115deg, rgb(211 255 215), rgb(0 0 0)), 
    radial-gradient( 90% 100% at calc( 50% + var(--x)) calc( 0% + var(--y)), rgb(200 200 200), rgb(022 000 045)), 
    radial-gradient(100% 100% at calc( 80% - var(--x)) calc( 0% - var(--y)), rgb(250 255 000), rgb(036 000 000)), 
    radial-gradient(150% 210% at calc(100% + var(--x)) calc( 0% + var(--y)), rgb(020 175 125), rgb(000 010 255)), 
    radial-gradient(100% 100% at calc(100% - var(--x)) calc(30% - var(--y)), rgb(255 077 000), rgb(000 200 255)), 
    linear-gradient(60deg, rgb(255 000 000), rgb(120 086 255));
  background-blend-mode: overlay, overlay, difference, difference, difference, normal;
}
</style>
<title>PhotoMash Photo Editor</title>
<center><h1 class="header">PhotoMash Photo Editor</h1></center>
<center><input type="file" id="upload" accept="image/*"></center>
<canvas id="canvas"></canvas>
<div class="controls">
  <div class="subControl">
    <center><label><mark>Brightness</mark></label></center>
    <center><input type="range" id="brightness" min="0" max="200" value="100"></center>
    <center><label><mark>Contrast</mark></label></center>
    <center><input type="range" id="contrast" min="0" max="200" value="100"></center>
    <center><label><mark>Saturation</mark></label></center>
    <center><input type="range" id="saturation" min="0" max="200" value="100"></center>
  </div>
  <div class="subControl">
    <center><button id="cropBtn">Start Crop</button></center>
    <br>
    <center><button id="applyBtn">Apply Crop</button></center>
    <br>
    <center><button id="flipHorizontal">Flip Horizontal</button></center>
    <br>
    <center><button id="flipV">Flip Vertical</button></center>
    </div>

    <div class="subControl">
      <br>
          <center><label><mark>Rotate</mark></label></center>
          <center><input type="range" id="rotate" min="0" max="360" value="0" /></center>
<br>
          <center><label><mark>Scale</mark></label></center>
          <center><input type="range" id="scale" min="50" max="150" value="100" /></center>
        </div>
      </div>
      <br>
      <center><button id="download-btn">Download Edited Image</button></center>
    </div>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
  const uploadInput = document.getElementById("upload");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const brightnessSlider = document.getElementById("brightness");
  const contrastSlider = document.getElementById("contrast");
  const saturationSlider = document.getElementById("saturation");
  const rotateSlider = document.getElementById("rotate");
  const scaleSlider = document.getElementById("scale");
  const cropBtn = document.getElementById("crop-btn");
  const applyCropBtn = document.getElementById("apply-crop-btn");
  const downloadBtn = document.getElementById("download-btn");

  let img = new Image();
  let isCropping = false;
  let isFlippedHorizontal = false;
  let isFlippedVertical = false;

  let cropStartX, cropStartY, cropWidth, cropHeight;

  // Function to draw the image
  function drawImage() {
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();

    ctx.translate(canvas.width / 2, canvas.height / 2);
    // Apply rotation and flipping transformations
    if (isFlippedHorizontal) ctx.scale(-1, 1);
    if (isFlippedVertical) ctx.scale(1, -1);

    ctx.drawImage(
      img,
      -canvas.width / 2,
      -canvas.height / 2,
      canvas.width,
      canvas.height
    );
    ctx.restore();
  }

  // Function to apply filters and transformations
  function applyEdits() {
    const brightness = brightnessSlider.value;
    const contrast = contrastSlider.value;
    const saturation = saturationSlider.value;
    const rotate = rotateSlider.value;
    const scale = scaleSlider.value / 100;

    canvas.width = img.width * scale;
    canvas.height = img.height * scale;

    ctx.filter = `
            brightness(${brightness}%)
            contrast(${contrast}%)
            saturate(${saturation}%)
        `;

    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.rotate((rotate * Math.PI) / 180);
    ctx.drawImage(
      img,
      -canvas.width / 2,
      -canvas.height / 2,
      canvas.width,
      canvas.height
    );
    ctx.restore();
  }

  // Upload image
  uploadInput.addEventListener("change", (e) => {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = (event) => {
      img.src = event.target.result;
    };

    reader.readAsDataURL(file);

    img.onload = drawImage;
  });

  // Event listeners for filters and transformations
  brightnessSlider.addEventListener("input", applyEdits);
  contrastSlider.addEventListener("input", applyEdits);
  saturationSlider.addEventListener("input", applyEdits);
  rotateSlider.addEventListener("input", applyEdits);
  scaleSlider.addEventListener("input", applyEdits);

  // Cropping functionality
  cropBtn.addEventListener("click", () => {
    canvas.style.cursor = "crosshair";
    isCropping = true;
    canvas.addEventListener("mousedown", startCrop);
    canvas.addEventListener("mouseup", endCrop);
  });

  function startCrop(event) {
    cropStartX = event.offsetX;
    cropStartY = event.offsetY;
  }

  function endCrop(event) {
    cropWidth = event.offsetX - cropStartX;
    cropHeight = event.offsetY - cropStartY;
    isCropping = false;
  }

  applyCropBtn.addEventListener("click", () => {
    if (cropWidth && cropHeight) {
      const croppedImage = ctx.getImageData(
        cropStartX,
        cropStartY,
        cropWidth,
        cropHeight
      );
      canvas.width = cropWidth;
      canvas.height = cropHeight;
      ctx.putImageData(croppedImage, 0, 0);
      canvas.style.cursor = "pointer";
    }
  });
  document.getElementById("flip-horizontal").addEventListener("click", () => {
    isFlippedHorizontal = !isFlippedHorizontal;
    drawImage();
  });
  document.getElementById("flip-vertical").addEventListener("click", () => {
    isFlippedVertical = !isFlippedVertical;
    drawImage();
  });

  downloadBtn.addEventListener("click", () => {
    const link = document.createElement("a");
    link.download = "edited-image.png";
    link.href = canvas.toDataURL();
    link.click();
  });
});
    </script>
</div>
</html>
